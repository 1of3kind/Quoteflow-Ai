version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - ./:/app
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: .
    env_file:
      - .env
    depends_on:
      - redis
    command: celery -A workers.celery_tasks.celery_app worker --loglevel=info -Q celery,default

  scheduler:
    build: .
    env_file:
      - .env
    depends_on:
      - redis
    command: celery -A workers.celery_tasks.celery_app beat --loglevel=info

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  redis_data:
